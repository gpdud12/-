<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지구를 지키는 룰렛 게임</title>

<style>
body {
  margin: 0;
  background: #f2fff0;
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  color: #16702a;
  font-size: 42px;
  margin: 20px 0 10px;
}

.game {
  position: relative;
  width: 820px;
  height: 820px;
  margin: 0 auto;
}

.pointer {
  position: absolute;
  top: 20px;
  left: 375px;
  width: 0;
  height: 0;
  border-left: 35px solid transparent;
  border-right: 35px solid transparent;
  border-top: 85px solid red;
  z-index: 100;
}

.wheel {
  position: absolute;
  top: 80px;
  left: 80px;
  width: 660px;
  height: 660px;
  border-radius: 50%;
  border: 10px solid #35a243;
  overflow: hidden;
  transition: transform 4.5s cubic-bezier(.12,.8,.18,1);
  background: conic-gradient(
    from -25.7deg,
    #ffcfdc 0deg 51.43deg,
    #d9c9ff 51.43deg 102.86deg,
    #fff0a8 102.86deg 154.29deg,
    #c9f7c7 154.29deg 205.72deg,
    #c8ecff 205.72deg 257.15deg,
    #ffd8c8 257.15deg 308.58deg,
    #c9fff4 308.58deg 360deg
  );
}

/* 칸 경계선 */
.line {
  position: absolute;
  width: 4px;
  height: 330px;
  background: white;
  left: 328px;
  top: 0;
  transform-origin: bottom center;
}

.line1 { transform: rotate(25.7deg); }
.line2 { transform: rotate(77.1deg); }
.line3 { transform: rotate(128.6deg); }
.line4 { transform: rotate(180deg); }
.line5 { transform: rotate(231.4deg); }
.line6 { transform: rotate(282.9deg); }
.line7 { transform: rotate(334.3deg); }

.item {
  position: absolute;
  width: 135px;
  text-align: center;
  transform: translate(-50%, -50%);
  z-index: 20;
}

.card {
  width: 105px;
  height: 105px;
  background: white;
  border: 5px solid #df351d;
  border-radius: 8px;
  margin: 0 auto 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card img {
  width: 95px;
  height: 95px;
  object-fit: contain;
}

.name {
  width: 135px;
  background: rgba(255,255,255,0.92);
  border-radius: 18px;
  padding: 7px 4px;
  font-size: 18px;
  font-weight: bold;
  color: black;
  box-sizing: border-box;
}

.center {
  position: absolute;
  top: 278px;
  left: 278px;
  width: 104px;
  height: 104px;
  border-radius: 50%;
  background: #35a243;
  color: white;
  font-size: 25px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  border: 7px solid white;
}

button {
  margin-top: 0;
  font-size: 27px;
  padding: 15px 55px;
  border: none;
  border-radius: 20px;
  background: #35a243;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  font-size: 25px;
  font-weight: bold;
  color: #16702a;
}
</style>
</head>

<body>

<h1>🌿 지구를 지키는 룰렛 게임 🌿</h1>

<div class="game">
  <div class="pointer"></div>

  <div class="wheel" id="wheel">
    <div class="line line1"></div>
    <div class="line line2"></div>
    <div class="line line3"></div>
    <div class="line line4"></div>
    <div class="line line5"></div>
    <div class="line line6"></div>
    <div class="line line7"></div>

    <div class="item" data-angle="0">
      <div class="card"><img src="비닐봉투.PNG"></div>
      <div class="name">비닐봉투</div>
    </div>

    <div class="item" data-angle="51.43">
      <div class="card"><img src="일회용 빨대.PNG"></div>
      <div class="name">일회용 빨대</div>
    </div>

    <div class="item" data-angle="102.86">
      <div class="card"><img src="종이컵.PNG"></div>
      <div class="name">종이컵</div>
    </div>

    <div class="item" data-angle="154.29">
      <div class="card"><img src="일회용 수저 젓가락.PNG"></div>
      <div class="name">일회용 수저·젓가락</div>
    </div>

    <div class="item" data-angle="205.72">
      <div class="card"><img src="일회용 물티슈.PNG"></div>
      <div class="name">물티슈</div>
    </div>

    <div class="item" data-angle="257.15">
      <div class="card"><img src="비닐우산.PNG"></div>
      <div class="name">비닐 우산</div>
    </div>

    <div class="item" data-angle="308.58">
      <div class="card"><img src="비닐장갑.PNG"></div>
      <div class="name">비닐 장갑</div>
    </div>

    <div class="center">START</div>
  </div>
</div>

<button onclick="spin()">룰렛 돌리기 ↻</button>
<div class="result" id="result"></div>

<script>
let degree = 0;
let spinning = false;

const wheelSize = 660;
const center = wheelSize / 2;
const radius = 235;
const section = 360 / 7;

placeItems();

function placeItems() {
  document.querySelectorAll(".item").forEach(item => {
    const angle = Number(item.dataset.angle) - 90;
    const rad = angle * Math.PI / 180;

    item.style.left = center + radius * Math.cos(rad) + "px";
    item.style.top = center + radius * Math.sin(rad) + "px";
  });
}

function spin() {
  if (spinning) return;

  spinning = true;
  document.getElementById("result").innerText = "";

  const randomDegree = Math.floor(Math.random() * 360);
  degree += 1800 + randomDegree;

  document.getElementById("wheel").style.transform =
    `rotate(${degree}deg)`;

  setTimeout(() => {
    showResult();
    spinning = false;
  }, 4600);
}

function showResult() {
  const names = document.querySelectorAll(".name");
  const pointerDegree = (360 - (degree % 360)) % 360;
  const index = Math.round(pointerDegree / section) % 7;

  document.getElementById("result").innerText =
    "🎉 당첨: " + names[index].innerText + " 🎉";
}
</script>

</body>
</html>
