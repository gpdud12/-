<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>지구를 지키는 룰렛 게임</title>
<style>
  body {
    margin: 0;
    background: #efffee;
    font-family: "Arial", sans-serif;
    text-align: center;
  }

  h1 {
    color: #087528;
    font-size: 42px;
    margin: 35px 0 20px;
  }

  .roulette-wrap {
    position: relative;
    width: 700px;
    height: 700px;
    margin: 0 auto;
  }

  .pointer {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-top: 90px solid red;
    z-index: 10;
  }

  .wheel {
    width: 700px;
    height: 700px;
    border-radius: 50%;
    border: 8px solid #2f9e44;
    position: relative;
    overflow: hidden;
    transition: transform 4s ease-out;
    background: conic-gradient(
      #ffc7d5 0deg 51.4deg,
      #c9b6ff 51.4deg 102.8deg,
      #fff2a6 102.8deg 154.2deg,
      #c9f5c8 154.2deg 205.6deg,
      #bfe9ff 205.6deg 257deg,
      #ffd4c2 257deg 308.4deg,
      #c6fff2 308.4deg 360deg
    );
  }

  .item {
    position: absolute;
    width: 140px;
    text-align: center;
    transform: translate(-50%, -50%);
  }

  .item img {
    width: 90px;
    height: 90px;
    object-fit: contain;
    background: white;
    border-radius: 50%;
    padding: 15px;
  }

  .item p {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 18px;
    background: white;
    border-radius: 20px;
    font-size: 20px;
    font-weight: bold;
  }

  .center {
    position: absolute;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: #2faa45;
    color: white;
    font-size: 28px;
    font-weight: bold;
    line-height: 110px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 6px solid white;
    z-index: 5;
  }

  button {
    margin-top: 25px;
    background: #2faa45;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 16px 45px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
  }

  button:hover {
    background: #238c38;
  }

  #result {
    margin-top: 12px;
    font-size: 20px;
    font-weight: bold;
    color: #087528;
  }
</style>
</head>

<body>

<h1>🌿 지구를 지키는 룰렛 게임 🌿</h1>

<div class="roulette-wrap">
  <div class="pointer"></div>

  <div class="wheel" id="wheel">
    <div class="item" style="top: 13%; left: 50%;">
      <img src="비닐봉투.PNG">
      <p>비닐봉투</p>
    </div>

    <div class="item" style="top: 28%; left: 78%;">
      <img src="일회용 빨대.PNG">
      <p>일회용 빨대</p>
    </div>

    <div class="item" style="top: 58%; left: 82%;">
      <img src="종이컵.PNG">
      <p>종이컵</p>
    </div>

    <div class="item" style="top: 82%; left: 62%;">
      <img src="일회용 수저 젓가락.PNG">
      <p>일회용 수저·젓가락</p>
    </div>

    <div class="item" style="top: 82%; left: 38%;">
      <img src="물티슈.PNG">
      <p>물티슈</p>
    </div>

    <div class="item" style="top: 58%; left: 18%;">
      <img src="비닐우산.PNG">
      <p>비닐 우산</p>
    </div>

    <div class="item" style="top: 28%; left: 22%;">
      <img src="비닐장갑.PNG">
      <p>비닐 장갑</p>
    </div>
  </div>

  <div class="center">START</div>
</div>

<button onclick="spin()">룰렛 돌리기 ↻</button>
<div id="result">🎉 당첨: 일회용 빨대 🎉</div>

<script>
  const wheel = document.getElementById("wheel");
  const result = document.getElementById("result");

  const items = [
    "비닐봉투",
    "일회용 빨대",
    "종이컵",
    "일회용 수저·젓가락",
    "물티슈",
    "비닐 우산",
    "비닐 장갑"
  ];

  let currentRotation = 0;

  function spin() {
    const randomIndex = Math.floor(Math.random() * items.length);
    const anglePerItem = 360 / items.length;

    const targetAngle = 360 - (randomIndex * anglePerItem) - anglePerItem / 2;
    const extraSpin = 360 * 5;

    currentRotation += extraSpin + targetAngle;

    wheel.style.transform = `rotate(${currentRotation}deg)`;

    result.textContent = "룰렛이 돌아가는 중...";

    setTimeout(() => {
      result.textContent = `🎉 당첨: ${items[randomIndex]} 🎉`;
    }, 4000);
  }
</script>

</body>
</html>
